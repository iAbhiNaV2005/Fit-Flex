name: CI/CD Pipeline

on:
  push:
    branches: [ "main"] 
  pull_request:
    branches: [ "main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint  
        run: pnpm lint
      
      - name: Check code formatting (ESLint)
        run: pnpm lint -- --format json --output-file lint-results.json || true
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build application
        run: pnpm build
      
      - name: Check build artifacts
        run: test -d dist && echo "Build successful" || exit 1
      
      - name: Upload build artifacts
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist
          retention-days: 5

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Check for known vulnerabilities
        run: pnpm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Dependency check
        run: pnpm list --depth=0

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build and analyze
        run: pnpm build

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint, build, security, bundle-analysis]
    if: always()
    
    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "❌ Linting failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          if [ "${{ needs.security.result }}" = "failure" ]; then
            echo "⚠️ Security check issues (warnings only)"
          fi
          echo "✅ All required checks passed!"
